{% load static %}
<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Panel logowania</title>
    <link rel="stylesheet" href="{% static 'polls/css/styles.css' %}" />
  </head>

  <body>
    {% if messages %} {% for message in messages %}
    <div
      class="alert {{ message.tags }}" style="background: rgba(255, 0, 0, 0.7);color: white;padding: 10px;text-align: center;">
      {{ message }}
    </div>
    {% endfor %} {% endif %}

    <main class="page-content">
      <div class="form-center">
        <div class="container">
          <div class="switch">
            <button id="loginBtn" class="active">Logowanie</button>
            <button id="registerBtn">Rejestracja</button>
          </div>

          <div class="card-form">
            <h3>Panel logowania/rejestracji</h3>

            <form id="loginForm" method="POST" class="form active" style="display: flex; flex-direction: column;">
    {% csrf_token %}
    <input type="hidden" name="action" value="login">
    <input type="text" name="login" placeholder="Login lub e-mail" required>
    <input type="password" name="password" placeholder="Hasło" required>
    <button type="submit">Zaloguj się</button>
</form>

<form id="registerForm" method="POST" class="form" style="display: none; flex-direction: column;">
    {% csrf_token %}
    <input type="hidden" name="action" value="register">
    <input type="text" name="login" placeholder="Login" required>
    <input type="email" name="email" placeholder="E-mail" required>
    <input type="password" name="password" placeholder="Hasło" required>
    <input type="password" name="password2" placeholder="Powtórz hasło" required>
    <button type="submit">Zarejestruj się</button>
</form>
          </div>
        </div>
      </div>
    </main>

    <script src="{% static 'polls/js/script.js' %}"></script>
    <script>
      const lBtn = document.getElementById("loginBtn");
      const rBtn = document.getElementById("registerBtn");
      const lForm = document.getElementById("loginForm");
      const rForm = document.getElementById("registerForm");

      rBtn.onclick = function () {
        lForm.style.display = "none";
        rForm.style.display = "flex";
        rBtn.classList.add("active");
        lBtn.classList.remove("active");
      };

      lBtn.onclick = function () {
        rForm.style.display = "none";
        lForm.style.display = "flex";
        lBtn.classList.add("active");
        rBtn.classList.remove("active");
      };

      setTimeout(() => {
        const alert = document.querySelector(".alert");
        if (alert) alert.style.display = "none";
      }, 3000);
    </script>
  </body>
</html>
